<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Cyber Missions RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', Arial, sans-serif;
    background: #050505;
    color: #d9ff00;
}

h1 {
    text-align: center;
    padding: 15px;
    text-shadow: 0 0 10px #d9ff00, 0 0 20px #d9ff00;
}

#toggleBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 25px;
    cursor: pointer;
    z-index: 1000;
}

/* MENU */
#menu {
    position: fixed;
    left: 0;
    top: 0;
    width: 220px;
    height: 100%;
    background: rgba(0,0,0,0.95);
    border-right: 2px solid #d9ff00;
    padding: 10px;
    transition: 0.3s;
}

#menu.closed {
    width: 60px;
}

#menu.closed .missionItem {
    font-size: 0;
}

/* MAPA */
#map {
    position: relative;
    margin-left: 220px;
    width: calc(100% - 220px);
    height: 90vh;
    background: url('https://i.redd.it/guu752sow2v51.png') center/cover no-repeat;
    filter: brightness(0.7) contrast(1.2);
    transition: 0.3s;
}

#map.full {
    margin-left: 60px;
    width: calc(100% - 60px);
}



.missionItem:hover {
    color: #fff;
}

.point {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.active {
    background: radial-gradient(circle, #ff003c 40%, #000 70%);
    border: 2px solid #ff003c;
    box-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c;
}

.active:hover {
    transform: scale(1.3);
}

.done {
    background: radial-gradient(circle, #00ff88 40%, #000 70%);
    border: 2px solid #00ff88;
    opacity: 0.6;
    pointer-events: none;
}

#modal {
    position: fixed;
    top: 50%;
    left: 60%;
    transform: translate(-50%, -50%);
    background: rgba(10, 10, 10, 0.95);
    padding: 20px;
    border: 2px solid #d9ff00;
    display: none;
    width: 320px;
    box-shadow: 0 0 20px #d9ff00;
}

button {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(45deg, #d9ff00, #00aaff);
    border: none;
    padding: 12px;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="toggleBtn" onclick="toggleMenu()">☰</div>

<div id="menu">
<h3>CONTRATOS</h3>
<div id="missionList"></div>
</div>

<h1 style="margin-left:220px;">CYBER MISSIONS</h1>

<button onclick="startMusic(); playSound('click')">INICIAR CONEXÃO</button>

<div id="map">
<div class="point active" data-id="0" style="top:40%; left:30%;" onclick="openMission(0); playSound('click')"></div>
<div class="point active" data-id="1" style="top:60%; left:60%;" onclick="openMission(1); playSound('click')"></div>
<div class="point active" data-id="2" style="top:40%; left:70%;" onclick="openMission(2); playSound('click')"></div>
<div class="point active" data-id="3" style="top:60%; left:30%;" onclick="openMission(3); playSound('click')"></div>
</div>

<div id="modal">
<h2 id="title"></h2>
<p id="location"></p>
<p id="desc"></p>
<p><strong>Recompensa:</strong> <span id="reward"></span></p>
<button onclick="completeMission(); playSound('click')">Completar</button>
<button onclick="closeModal(); playSound('click')">Fechar</button>
</div>

<audio id="bgMusic" loop>
<source src="sounds/ambient.mp3" type="audio/mpeg">
</audio>

<script>
const sounds = {
click: new Audio("sounds/click.mp3")
};

function playSound(type) {
if (!sounds[type]) return;
sounds[type].currentTime = 0;
sounds[type].play();
}

function startMusic() {
const music = document.getElementById("bgMusic");
music.volume = 0.3;
music.play();
}

const missions = [
{
title: "Fantasma no Sistema",
location: "Arasaka Boulevard, City Center",
desc: "Invadir servidor de uma corporação.",
reward: "5000 créditos",
completed: false
},
{
title: "Dívida de Sangue",
location: "Kabuki Market, Watson",
desc: "Cobrar ou eliminar o alvo.",
reward: "Arma rara",
completed: false
},
{
title: "Sombra do Passado",
location: "Ghost Block, Pacifica",
desc: "Investigar assassinato no bairro.",
reward: "10000 créditos",
completed: false
}
];

let currentMission = null;

function toggleMenu() {
const menu = document.getElementById("menu");
const map = document.getElementById("map");

menu.classList.toggle("closed");
map.classList.toggle("full");
}

function renderMenu() {
const container = document.getElementById("missionList");
container.innerHTML = "";

missions.forEach((m, i) => {
const div = document.createElement("div");
div.className = "missionItem";
div.innerText = m.title;
div.onclick = () => openMission(i);
container.appendChild(div);
});
}

function openMission(index) {
if (missions[index].completed) return;

currentMission = index;

document.getElementById("title").innerText = missions[index].title;
document.getElementById("location").innerText = "📍 " + missions[index].location;
document.getElementById("desc").innerText = missions[index].desc;
document.getElementById("reward").innerText = missions[index].reward;

document.getElementById("modal").style.display = "block";
}

function closeModal() {
document.getElementById("modal").style.display = "none";
}

function completeMission() {
missions[currentMission].completed = true;

const point = document.querySelector(`[data-id="${currentMission}"]`);
if (point) {
point.classList.remove("active");
point.classList.add("done");
point.title = "Missão concluída";
}

alert("Contrato finalizado.");
closeModal();
}

renderMenu();
</script>

</body>
</html>
