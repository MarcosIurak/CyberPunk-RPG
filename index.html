<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Cyber Missions RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', Arial, sans-serif;
    background: #050505;
    color: #d9ff00;
}

h1 {
    text-align: center;
    padding: 15px;
    text-shadow: 0 0 10px #d9ff00, 0 0 20px #d9ff00;
}

#map {
    position: relative;
    width: 100%;
    height: 90vh;
    background: url('https://gamemappers.com/wp-content/uploads/3b90yo.jpg') center/cover no-repeat;
    filter: brightness(0.7) contrast(1.2);
}

.point {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.active {
    background: radial-gradient(circle, #ff003c 40%, #000 70%);
    border: 2px solid #ff003c;
    box-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c;
}

.active:hover {
    transform: scale(1.3);
    box-shadow: 0 0 15px #ff003c, 0 0 30px #ff003c;
}

.done {
    background: radial-gradient(circle, #00ff88 40%, #000 70%);
    border: 2px solid #00ff88;
    box-shadow: 0 0 10px #00ff88;
    opacity: 0.6;
    pointer-events: none;
}

#modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 10, 10, 0.95);
    padding: 20px;
    border: 2px solid #d9ff00;
    display: none;
    width: 320px;
    box-shadow: 0 0 20px #d9ff00;
    backdrop-filter: blur(8px);
}

button {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(45deg, #d9ff00, #00aaff);
    border: none;
    padding: 12px;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px #d9ff00;
    transition: 0.2s;
}

button:hover {
    background: linear-gradient(45deg, #ff00ff, #ff003c);
    color: #fff;
    transform: scale(1.05);
}

#modal h2 {
    text-shadow: 0 0 10px #d9ff00;
}

#modal p {
    color: #ccc;
}
</style>
</head>

<body>

<h1>CYBER MISSIONS</h1>

<button onclick="startMusic(); playSound('click')">INICIAR CONEXÃO</button>

<div id="map">
<div class="point active" data-id="0" style="top:40%; left:30%;" onclick="openMission(0); playSound('open')"></div>
<div class="point active" data-id="1" style="top:60%; left:60%;" onclick="openMission(1); playSound('open')"></div>
</div>

<div id="modal">
<h2 id="title"></h2>
<p id="desc"></p>
<p><strong>Recompensa:</strong> <span id="reward"></span></p>
<button onclick="completeMission()">Completar</button>
<button onclick="closeModal()">Fechar</button>
</div>

<audio id="bgMusic" loop>
<source src="sounds/ambient.mp3" type="audio/mpeg">
</audio>

<script>
const sounds = {
click: new Audio("sounds/click.mp3"),
open: new Audio("sounds/open.mp3"),
success: new Audio("sounds/success.mp3")
};

function playSound(type) {
if (!sounds[type]) return;
sounds[type].currentTime = 0;
sounds[type].play();
}

function startMusic() {
const music = document.getElementById("bgMusic");
music.volume = 0.3;
music.play();
}

const missions = [
{
title: "Fantasma no Sistema",
desc: "Invadir servidor de uma corporação.",
reward: "5000 créditos",
completed: false
},
{
title: "Dívida de Sangue",
desc: "Cobrar ou eliminar o alvo.",
reward: "Arma rara",
completed: false
}
];

let currentMission = null;

function openMission(index) {
if (missions[index].completed) return;

currentMission = index;

document.getElementById("title").innerText = missions[index].title;
document.getElementById("desc").innerText = missions[index].desc;
document.getElementById("reward").innerText = missions[index].reward;

document.getElementById("modal").style.display = "block";
}

function closeModal() {
document.getElementById("modal").style.display = "none";
}

function completeMission() {
missions[currentMission].completed = true;

const point = document.querySelector(`[data-id="${currentMission}"]`);
if (point) {
point.classList.remove("active");
point.classList.add("done");
point.title = "Missão concluída";
}

playSound('success');

closeModal();
}
</script>

</body>
</html>
